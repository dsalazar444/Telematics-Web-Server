<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Galería modificada</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            text-align: center;
        }
        .galeria {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 10px;
        }
        .galeria img {
            width: 200px;
            height: auto;
            border: 2px solid #ccc;
        }
    </style>
</head>
<body>

    <h1>Galería de Imágenes</h1>

    <div class="galeria">
        <img src="./cat.png" alt="Imagen 1">
        <img src="/img/img2.jpg" alt="Imagen 2">
        <img src="/img/img3.jpg" alt="Imagen 3">
        <img src="/img/img4.jpg" alt="Imagen 4">
    </div>

</body>
